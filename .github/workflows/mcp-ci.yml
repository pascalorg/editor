name: mcp-ci

on:
  push:
    branches: [main]
    paths:
      - 'packages/mcp/**'
      - 'packages/core/**'
      - 'bun.lock'
  pull_request:
    paths:
      - 'packages/mcp/**'
      - 'packages/core/**'
      - 'bun.lock'

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build core
        run: bun run --cwd packages/core build

      - name: Build mcp
        run: bun run --cwd packages/mcp build

      - name: Test mcp
        run: bun test --cwd packages/mcp

      - name: Biome check
        run: bunx biome check packages/mcp
