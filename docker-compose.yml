version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: apps/editor/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - DATABASE_URL=postgresql://pascal:pascal@db:5432/pascal_db
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=https://${DOMAIN}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=pascal
      - POSTGRES_PASSWORD=pascal
      - POSTGRES_DB=pascal_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

volumes:
  pgdata:
