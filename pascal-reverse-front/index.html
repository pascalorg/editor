<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="logo-web-icon.svg">
    <title>MeasureNavi - 空間計測・設計・リフォーム支援</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    boxShadow: {
                        'premium': '0 10px 30px -10px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.02)',
                        'hover-card': '0 20px 40px -15px rgba(20, 184, 166, 0.15), 0 1px 10px rgba(0, 0, 0, 0.02)',
                        'dropdown': '0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05)'
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts & FontAwesome Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', 'system-ui', '-apple-system', sans-serif;
            background-color: #f8fafc;
        }
        /* Custom scrollbar to keep layout premium */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* 中央主导航：下划线柔和滑入动画 */
        .main-tab {
            position: relative;
            padding: 0.25rem 0; /* 让下划线贴近文字 */
            font-size: 0.875rem;
            font-weight: 500;
            color: #64748b; /* slate-500 */
            transition: color 0.25s ease;
            outline: none;
        }
        .main-tab:hover { color: #1e293b; /* slate-800 */ }
        .main-tab::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: -7px;
            height: 2px;
            background: #0d9488; /* teal-600 */
            border-radius: 9999px;
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .main-tab.is-active {
            color: #0d9488; /* teal-600 */
            font-weight: 600;
        }
        .main-tab.is-active::after { transform: scaleX(1); }

        /* 视图切换：柔和淡入上移 */
        @keyframes viewFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .view-anim { animation: viewFadeIn 0.35s ease both; }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col antialiased">

    <!-- 顶部 Logo 导航栏 (Sticky Header with Glassmorphism) -->
    <header class="sticky top-0 z-40 w-full bg-white/85 backdrop-blur-md border-b border-slate-100 transition-all">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between relative">

            <!-- 左侧 Logo 区域 -->
            <div class="flex items-center">
                <img src="logo.svg" alt="MeasureNavi" style="height:36px;width:auto;display:block;">
            </div>

            <!-- 中央主导航：我的项目 / AI Agent 工具 (下划线式切换) -->
            <nav class="hidden md:flex absolute left-1/2 -translate-x-1/2 items-center gap-8 h-16">
                <button id="navProjectsBtn" onclick="switchMainTab('projects')" class="main-tab is-active">
                    <span data-i18n="navProjects">我的项目</span>
                </button>
                <button id="navAgentBtn" onclick="switchMainTab('agent')" class="main-tab">
                    <span data-i18n="navAgent">AI Agent 工具</span>
                </button>
            </nav>

            <!-- 右侧操作栏：多语言选择 + 个人信息 -->
            <div class="flex items-center gap-4">
                
                <!-- 可选择的多语言下拉菜单 (Language Selection Dropdown) -->
                <div class="relative dropdown-container" id="langDropdownContainer">
                    <button id="langSelectBtn" onclick="toggleLangDropdown(event)" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-slate-200 bg-white hover:bg-slate-50 hover:border-slate-300 text-xs font-semibold text-slate-600 shadow-sm transition focus:outline-none">
                        <i class="fa-solid fa-globe text-teal-500"></i>
                        <span id="currentLangLabel">中文 (CN)</span>
                        <i class="fa-solid fa-chevron-down text-[10px] text-slate-400 ml-0.5 transition-transform duration-200" id="langChevron"></i>
                    </button>
                    
                    <!-- 语言选项卡 -->
                    <div id="langDropdown" class="hidden absolute right-0 mt-2 w-36 bg-white rounded-xl shadow-dropdown border border-slate-100 py-1.5 z-50 transition-all transform origin-top-right">
                        <button onclick="selectLanguage('zh')" class="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs text-slate-600 flex items-center justify-between transition">
                            <span>中文 (CN)</span>
                            <i class="fa-solid fa-check text-teal-500 text-[10px] hidden" id="check-zh"></i>
                        </button>
                        <button onclick="selectLanguage('en')" class="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs text-slate-600 flex items-center justify-between transition">
                            <span>English</span>
                            <i class="fa-solid fa-check text-teal-500 text-[10px] hidden" id="check-en"></i>
                        </button>
                        <button onclick="selectLanguage('ja')" class="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs text-slate-600 flex items-center justify-between transition">
                            <span>日本語</span>
                            <i class="fa-solid fa-check text-teal-500 text-[10px] hidden" id="check-ja"></i>
                        </button>
                    </div>
                </div>

                <!-- 分割线 -->
                <div class="h-6 w-px bg-slate-200"></div>

                <!-- 个人头像与名字展示 -->
                <div class="flex items-center gap-3">
                    <div class="text-right hidden sm:block">
                        <span class="block text-sm font-semibold text-slate-800">田中 美咲</span>
                        <span class="block text-[11px] text-slate-400 font-medium">リフォームプランナー</span>
                    </div>
                    <div class="relative group cursor-pointer">
                        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&h=150&q=80" alt="Avatar" class="h-10 w-10 rounded-full object-cover ring-2 ring-teal-500/10 group-hover:ring-teal-500 transition-all">
                        <div class="absolute bottom-0 right-0 h-3 w-3 rounded-full bg-emerald-500 ring-2 ring-white"></div>
                    </div>
                </div>

            </div>
        </div>
    </header>

    <!-- 主体内容区域 -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">

      <!-- ===== 视图一：我的项目 ===== -->
      <section id="viewProjects">

        <!-- 顶部欢迎和动作条 -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight flex items-center gap-2">
                    <span data-i18n="welcome">欢迎回来，</span><span class="text-teal-600">美咲</span>
                </h1>
                <p class="text-slate-500 text-sm mt-1" data-i18n="subWelcome">查看最新项目进度，推进您的空间计测与改造施工工作。</p>
            </div>
            <!-- 新建项目动作按钮 -->
            <button onclick="openCreateModal()" class="flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-teal-600 to-cyan-500 hover:from-teal-500 hover:to-cyan-400 shadow-md shadow-teal-100 hover:shadow-teal-200 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-150">
                <i class="fa-solid fa-plus"></i>
                <span data-i18n="btnCreate">新建项目</span>
            </button>
        </div>

        <!-- 过滤、搜索、排序与视图切换工具条 -->
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6 text-slate-500">
            
            <!-- 搜索框 -->
            <div class="relative w-full sm:max-w-xs group">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400 group-focus-within:text-teal-500 transition-colors">
                    <i class="fa-solid fa-magnifying-glass text-xs"></i>
                </span>
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="搜索项目..." class="w-full pl-9 pr-4 py-2 bg-slate-100/70 hover:bg-slate-200/50 focus:bg-white border border-transparent focus:border-slate-200 rounded-xl text-xs placeholder:text-slate-400 focus:outline-none focus:ring-4 focus:ring-slate-100 transition-all" />
            </div>

            <!-- 控制选项组合 -->
            <div class="flex items-center gap-4 w-full sm:w-auto justify-end text-xs">
                
                <!-- 排序选项 -->
                <div class="flex items-center gap-1.5 text-slate-400">
                    <span data-i18n="sortBy" class="hidden md:inline font-medium">排序:</span>
                    <select id="sortBySelect" onchange="handleSort()" class="bg-transparent hover:bg-slate-200/50 px-2 py-1.5 rounded-lg font-medium text-slate-600 focus:outline-none cursor-pointer transition">
                        <option value="newest" data-i18n="newest" selected>最近更新优先</option>
                        <option value="oldest" data-i18n="oldest">最旧更新优先</option>
                        <option value="name" data-i18n="name">按名称字母</option>
                    </select>
                </div>

                <div class="h-4 w-px bg-slate-200"></div>

                <!-- 视图切换 -->
                <div class="bg-slate-200/50 p-0.5 rounded-lg flex items-center">
                    <button id="viewGridBtn" onclick="changeView('grid')" class="w-8 p-1.5 rounded-md text-teal-600 bg-white shadow-sm transition-all duration-200" title="网格视图" data-title-i18n="viewGrid">
                        <i class="fa-solid fa-grip-vertical"></i>
                    </button>
                    <button id="viewListBtn" onclick="changeView('list')" class="w-8 p-1.5 rounded-md text-slate-400 hover:text-slate-600 transition-all duration-200" title="列表视图" data-title-i18n="viewList">
                        <i class="fa-solid fa-list"></i>
                    </button>
                </div>

            </div>
        </div>

        <!-- 项目文件展示区 (网格/列表渲染) -->
        <div id="projectGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 transition-all duration-300 relative">
            <!-- 动态渲染内容 -->
        </div>

        <!-- 空白缺省状态 -->
        <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-center">
            <div class="h-24 w-24 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 mb-4 animate-pulse">
                <i class="fa-solid fa-folder-open text-4xl"></i>
            </div>
            <h3 class="text-lg font-semibold text-slate-800" data-i18n="emptyTitle">没有找到任何项目文件</h3>
            <p class="text-slate-400 text-sm max-w-sm mt-1" data-i18n="emptySub">请尝试重新输入搜索关键词，或点击“新建项目”开始创建第一个项目。</p>
            <button onclick="openCreateModal()" class="mt-4 px-4 py-2 bg-teal-50 hover:bg-teal-100 text-teal-600 text-xs font-semibold rounded-lg transition" data-i18n="btnCreate">新建项目</button>
        </div>

      </section>

      <!-- ===== 视图二：AI Agent 工具 ===== -->
      <section id="viewAgent" class="hidden">
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight" data-i18n="agentTitle">AI Agent 工具</h1>
                <p class="text-slate-500 text-sm mt-1" data-i18n="agentSub">选择合适的 AI 工具，加速你的空间设计与改造提案。</p>
            </div>
            <!-- 分类工具区（动态渲染） -->
            <div id="agentToolGroups" class="space-y-12"></div>
      </section>

    </main>

    <!-- 底部页脚 -->
    <footer class="bg-white border-t border-slate-100 py-6 text-center text-xs text-slate-400">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-3">
            <p>&copy; 2025 - LYTech Inc.</p>
            <p class="flex items-center gap-1">
                <span data-i18n="designedWith">Measure Navi - 空間計測・設計・リフォーム支援サービス</span> <i class="fa-solid fa-heart text-rose-500 animate-pulse"></i>
            </p>
        </div>
    </footer>

    <!-- 新建项目模态窗 -->
    <div id="createModal" class="fixed inset-0 z-50 overflow-y-auto hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end sm:items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" aria-hidden="true" onclick="closeCreateModal()"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="relative inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full border border-slate-100">
                <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between">
                    <div>
                        <h3 class="text-lg font-bold text-slate-900" id="modalTitleEl">新建项目文件</h3>
                        <p class="text-xs text-slate-400 mt-1" id="modalSubEl">所有加入的新项目在创建后均保存在您的本地空间。</p>
                    </div>
                    <button onclick="closeCreateModal()" class="text-slate-400 hover:text-slate-600 p-1 hover:bg-slate-50 rounded-lg transition">
                        <i class="fa-solid fa-xmark text-lg"></i>
                    </button>
                </div>
                <form id="projectForm" onsubmit="submitProjectForm(event)" class="p-6 space-y-4">
                    <input type="hidden" id="editProjectId" />
                    <div>
                        <label for="projectName" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2" data-i18n="fieldName">项目名称</label>
                        <input type="text" id="projectName" required placeholder="例：渋谷区マンション全室リフォーム" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 transition-all placeholder:text-slate-400" />
                    </div>
                    <div>
                        <label for="projectTitle" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2" data-i18n="fieldTitle">项目副标题/描述</label>
                        <input type="text" id="projectTitle" required placeholder="例：現地採寸・3D図面作成・施工見積もり一式" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 transition-all placeholder:text-slate-400" />
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2" data-i18n="fieldCover">选择项目封面</label>
                        <!-- 预设色块 + 上传按钮/预览 同一排 -->
                        <input type="file" id="projectCoverFile" accept="image/*" class="hidden" onchange="handleCoverUpload(event)" />
                        <div class="grid grid-cols-6 gap-2" id="presetCovers"></div>
                    </div>
                    <div class="pt-4 border-t border-slate-100 flex items-center justify-end gap-3">
                        <button type="button" onclick="closeCreateModal()" class="px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-600 bg-slate-50 hover:bg-slate-100 transition" data-i18n="btnCancel">取消</button>
                        <button type="submit" id="modalSubmitBtn" class="px-5 py-2.5 rounded-xl text-sm font-semibold text-white bg-teal-600 hover:bg-teal-500 shadow-md shadow-teal-100 transition">確認作成</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 自定义高级安全删除确认模态窗 -->
    <div id="deleteConfirmModal" class="fixed inset-0 z-50 overflow-y-auto hidden" role="dialog" aria-modal="true">
        <div class="flex items-end sm:items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onclick="closeDeleteConfirmModal()"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="relative inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-md sm:w-full border border-slate-100">
                <div class="p-6">
                    <div class="flex items-start gap-4">
                        <div class="h-10 w-10 rounded-full bg-rose-50 flex items-center justify-center text-rose-600 shrink-0">
                            <i class="fa-solid fa-triangle-exclamation text-lg"></i>
                        </div>
                        <div class="flex-grow">
                            <h3 class="text-base font-bold text-slate-900" data-i18n="confirmDeleteTitle">确定要删除该项目文件吗？</h3>
                            <p class="text-xs text-slate-400 mt-1.5 leading-relaxed" data-i18n="confirmDeleteSub">此项操作无法撤销。该项目文件及其包含的所有本地资源和属性信息都将被永久移除。</p>
                        </div>
                    </div>
                    <div class="mt-6 flex items-center justify-end gap-3 pt-4 border-t border-slate-100">
                        <button type="button" onclick="closeDeleteConfirmModal()" class="px-4 py-2 rounded-xl text-xs font-semibold text-slate-600 bg-slate-50 hover:bg-slate-100 transition" data-i18n="btnCancel">取消</button>
                        <button type="button" id="confirmDeleteBtn" class="px-4 py-2 rounded-xl text-xs font-semibold text-white bg-rose-600 hover:bg-rose-500 shadow-md shadow-rose-100 transition" data-i18n="menuDelete">删除项目</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 简易通知 Toast 系统 -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

        async function loadProjectsFromBackend() {
            try {
                const response = await fetch('/proxy/scenes', {
                    headers: { 'Accept': 'application/json' }
                });
                if (!response.ok) throw new Error(`Failed to load scenes: ${response.status}`);

                const payload = await response.json();
                const scenes = Array.isArray(payload) ? payload : (payload.scenes || []);
                projects = scenes.map(mapSceneToProject);
                renderProjects();
            } catch (error) {
                console.warn('[MeasureNavi] Falling back to local project cache.', error);
                const cached = localStorage.getItem('nexus_projects');
                if (cached) {
                    projects = JSON.parse(cached);
                    projects.forEach(p => {
                        p.updatedAt = String(p.updatedAt || '').replace(/-/g, '/');
                    });
                } else {
                    projects = [...defaultProjects];
                    saveToLocalStorage();
                }
                renderProjects();
            }
        }

        function mapSceneToProject(scene) {
            const coverValue = scene.coverValue || scene.thumbnailUrl;
            const coverType = scene.coverType || (coverValue ? "image" : "gradient");
            return {
                id: scene.id,
                name: scene.name || scene.id,
                title: scene.description || (scene.projectId
                    ? `Project ${scene.projectId} · ${scene.nodeCount || 0} nodes`
                    : `${scene.nodeCount || 0} nodes · version ${scene.version || 0}`),
                cover: coverValue || "from-teal-600 to-cyan-500",
                coverType,
                updatedAt: formatSceneTime(scene.updatedAt),
                editorUrl: scene.editorUrl || `/_pascal/scene/${encodeURIComponent(scene.id)}`
            };
        }

        function formatSceneTime(value) {
            if (!value) return "";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return String(value).replace(/-/g, '/');
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            const hh = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            return `${yyyy}/${mm}/${dd} ${hh}:${min}`;
        }

        // 应用并翻译全局 UI 字符
        function applyLanguage(lang) {
            // 更新切换按钮显示当前选择语言
            const label = document.getElementById("currentLangLabel");
            if (lang === 'zh') {
                label.innerText = '中文 (CN)';
            } else if (lang === 'en') {
                label.innerText = 'English';
            } else if (lang === 'ja') {
                label.innerText = '日本語';
            }

            // 更新下拉勾选高亮
            document.getElementById('check-zh').classList.add('hidden');
            document.getElementById('check-en').classList.add('hidden');
            document.getElementById('check-ja').classList.add('hidden');
            document.getElementById(`check-${lang}`).classList.remove('hidden');

            // 更新页面中的普通多语言标记
            const elements = document.querySelectorAll("[data-i18n]");
            elements.forEach(el => {
                const key = el.getAttribute("data-i18n");
                if (dictionary[lang][key]) {
                    el.innerText = dictionary[lang][key];
                }
            });

            // 针对 placeholder 的多语言处理
            const searchInput = document.getElementById("searchInput");
            if (searchInput) {
                searchInput.setAttribute("placeholder", dictionary[lang].searchPlaceholder);
            }

            // 对带有 title attribute 的元素进行翻译
            const titleElements = document.querySelectorAll("[data-title-i18n]");
            titleElements.forEach(el => {
                const key = el.getAttribute("data-title-i18n");
                if (dictionary[lang][key]) {
                    el.setAttribute("title", dictionary[lang][key]);
                }
            });

            // 更换对应输入框的提示文本
            document.getElementById("projectName").setAttribute("placeholder", dictionary[lang].placeholderName);
            document.getElementById("projectTitle").setAttribute("placeholder", dictionary[lang].placeholderTitle);

        }

        // 多语言字段取值辅助函数
        // 仅预设示例（translatable: true）才跟随语言切换；用户添加的项目始终显示原始内容
        function getLocalizedField(p, field) {
            if (!p.translatable) return p[field] || '';
            if (currentLang === 'zh') return p[field] || p[field + '_en'] || '';
            if (currentLang === 'ja') return p[field + '_ja'] || p[field + '_en'] || p[field] || '';
            return p[field + '_en'] || p[field] || '';
        }

        // 保存项目列表至缓存
        function saveToLocalStorage() {
            localStorage.setItem('nexus_projects', JSON.stringify(projects));
        }

        function openProject(id) {
            const project = projects.find(p => p.id === id);
            const cachedUrl = project && project.editorUrl && project.editorUrl.includes('/scene/')
                ? project.editorUrl
                : null;
            const target = cachedUrl || `/_pascal/scene/${encodeURIComponent(id)}`;
            window.location.href = target;
        }

        async function uploadProjectCover(projectId) {
            if (!uploadedCoverFile) return null;

            const form = new FormData();
            form.append('file', uploadedCoverFile);

            const response = await fetch(`/proxy/scenes/${encodeURIComponent(projectId)}/cover`, {
                method: 'POST',
                body: form
            });

            if (!response.ok) throw new Error(`Cover upload failed (${response.status})`);
            const payload = await response.json();
            return payload.coverUrl;
        }

        async function saveProjectMetadata(projectId, data) {
            const response = await fetch(`/proxy/scenes/${encodeURIComponent(projectId)}/metadata`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (!response.ok) throw new Error(`Project metadata save failed (${response.status})`);
        }

        // 卡片项目渲染流程
        function renderProjects(filteredProjects = null) {
            const listToRender = filteredProjects || projects;
            const container = document.getElementById("projectGrid");
            const emptyState = document.getElementById("emptyState");

            if (listToRender.length === 0) {
                container.innerHTML = "";
                emptyState.classList.remove("hidden");
                emptyState.classList.add("flex");
                return;
            } else {
                emptyState.classList.remove("flex");
                emptyState.classList.add("hidden");
            }

            // 网格视图和列表视图的不同类样式应用
            if (currentView === 'grid') {
                container.className = "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6";
                container.innerHTML = listToRender.map(p => {
                    const displayCover = getCoverHTML(p);
                    const name = getLocalizedField(p, 'name');
                    const title = getLocalizedField(p, 'title');
                    
                    return `
                        <div onclick="openProject('${p.id}')" class="cursor-pointer bg-white rounded-2xl border border-slate-100 hover:border-slate-200/85 shadow-premium hover:shadow-hover-card hover:-translate-y-1 transition-all duration-300 group flex flex-col justify-between relative">
                            <!-- 封面裁剪放置在顶部容器中 -->
                            <div class="aspect-[16/10] w-full overflow-hidden bg-slate-50 relative rounded-t-2xl">
                                ${displayCover}
                            </div>
                            
                            <!-- 卡片具体文字内容 -->
                            <div class="p-5 flex-grow flex flex-col justify-between">
                                <div>
                                    <h3 class="font-bold text-slate-800 text-base line-clamp-1 group-hover:text-teal-600 transition duration-150">${escapeHTML(name)}</h3>
                                    <p class="text-xs text-slate-400 mt-1.5 line-clamp-2 leading-relaxed min-h-[2.5rem]">${escapeHTML(title)}</p>
                                </div>
                                
                                <!-- 卡片信息底栏 (斜杠格式：2026/05/28 09:30) -->
                                <div class="mt-4 pt-4 border-t border-slate-50 flex items-center justify-between text-xs text-slate-400">
                                    <div class="flex items-center gap-1.5 font-medium text-slate-400/80">
                                        <i class="fa-regular fa-clock text-slate-300"></i>
                                        <span>${p.updatedAt}</span>
                                    </div>
                                    
                                    <!-- 动作控制下拉上下文菜单 -->
                                    <div class="relative dropdown-container" onclick="event.stopPropagation()">
                                        <button onclick="toggleDropdown(event, '${p.id}')" class="text-slate-400 hover:text-teal-600 p-1.5 hover:bg-slate-50 rounded-lg transition-all focus:outline-none">
                                            <i class="fa-solid fa-ellipsis text-sm"></i>
                                        </button>
                                        
                                        <!-- 下拉菜单容器 -->
                                        <div id="dropdown-${p.id}" class="hidden absolute right-0 bottom-8 w-36 bg-white rounded-xl shadow-dropdown border border-slate-100 py-1.5 z-30 transition-all transform origin-bottom-right">
                                            <button onclick="openRenameModal('${p.id}')" class="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs text-slate-600 flex items-center gap-2 transition">
                                                <i class="fa-regular fa-pen-to-square text-slate-400 w-4"></i>
                                                <span>${dictionary[currentLang].menuRename}</span>
                                            </button>
                                            <button onclick="exportProjectData('${p.id}')" class="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs text-slate-600 flex items-center gap-2 transition">
                                                <i class="fa-solid fa-file-export text-slate-400 w-4"></i>
                                                <span>${dictionary[currentLang].menuExport}</span>
                                            </button>
                                            <div class="h-px bg-slate-100 my-1"></div>
                                            <button onclick="triggerDeleteProject('${p.id}')" class="w-full text-left px-4 py-2 hover:bg-rose-50 hover:text-rose-600 text-xs text-slate-600 flex items-center gap-2 transition">
                                                <i class="fa-regular fa-trash-can text-rose-400 w-4"></i>
                                                <span>${dictionary[currentLang].menuDelete}</span>
                                            </button>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>
                    `;
                }).join("");
            } else {
                // 列表视图展示形式
                container.className = "flex flex-col gap-3";
                container.innerHTML = listToRender.map(p => {
                    const displayCoverMini = getCoverMiniHTML(p);
                    const name = getLocalizedField(p, 'name');
                    const title = getLocalizedField(p, 'title');

                    return `
                        <div onclick="openProject('${p.id}')" class="cursor-pointer bg-white p-4 rounded-xl border border-slate-100 hover:border-teal-100 shadow-premium hover:shadow-md flex items-center justify-between gap-4 transition duration-200 group relative">
                            <!-- 左侧：微型缩略图 + 标题内容 -->
                            <div class="flex items-center gap-4 flex-grow min-w-0">
                                <div class="h-12 w-16 rounded-lg overflow-hidden shrink-0 bg-slate-50">
                                    ${displayCoverMini}
                                </div>
                                <div class="min-w-0">
                                    <h3 class="font-bold text-slate-800 text-sm line-clamp-1 group-hover:text-teal-600 transition">${escapeHTML(name)}</h3>
                                    <p class="text-xs text-slate-400 mt-0.5 line-clamp-1">${escapeHTML(title)}</p>
                                </div>
                            </div>

                            <!-- 右侧：更新时间与合并式操作菜单 -->
                            <div class="flex items-center gap-4 shrink-0 text-xs">
                                <div class="hidden md:block text-slate-400 font-medium">
                                    <span>${p.updatedAt}</span>
                                </div>
                                
                                <!-- 动作控制下拉上下文菜单 -->
                                <div class="relative dropdown-container" onclick="event.stopPropagation()">
                                    <button onclick="toggleDropdown(event, '${p.id}')" class="text-slate-300 hover:text-teal-600 p-1.5 hover:bg-slate-50 rounded-lg transition-all focus:outline-none">
                                        <i class="fa-solid fa-ellipsis text-sm"></i>
                                    </button>
                                    
                                    <!-- 下拉菜单容器 -->
                                    <div id="dropdown-${p.id}" class="hidden absolute right-0 top-8 w-36 bg-white rounded-xl shadow-dropdown border border-slate-100 py-1.5 z-30 transition-all transform origin-top-right">
                                        <button onclick="openRenameModal('${p.id}')" class="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs text-slate-600 flex items-center gap-2 transition">
                                            <i class="fa-regular fa-pen-to-square text-slate-400 w-4"></i>
                                            <span>${dictionary[currentLang].menuRename}</span>
                                        </button>
                                        <button onclick="exportProjectData('${p.id}')" class="w-full text-left px-4 py-2 hover:bg-slate-50 text-xs text-slate-600 flex items-center gap-2 transition">
                                            <i class="fa-solid fa-file-export text-slate-400 w-4"></i>
                                            <span>${dictionary[currentLang].menuExport}</span>
                                        </button>
                                        <div class="h-px bg-slate-100 my-1"></div>
                                        <button onclick="triggerDeleteProject('${p.id}')" class="w-full text-left px-4 py-2 hover:bg-rose-50 hover:text-rose-600 text-xs text-slate-600 flex items-center gap-2 transition">
                                            <i class="fa-regular fa-trash-can text-rose-400 w-4"></i>
                                            <span>${dictionary[currentLang].menuDelete}</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join("");
            }
        }

        // 操作控制下拉框的展示与折叠
        function toggleDropdown(event, id) {
            event.stopPropagation();
            const targetDropdown = document.getElementById(`dropdown-${id}`);
            const isCurrentlyVisible = !targetDropdown.classList.contains('hidden');
            
            closeAllDropdowns();
            
            if (!isCurrentlyVisible) {
                targetDropdown.classList.remove('hidden');
                activeDropdownId = id;
            }
        }

        // 根据图片或渐变生成不同类型的封面 HTML
        function getCoverHTML(p) {
            if (p.coverType === 'gradient') {
                return `<div class="w-full h-full bg-gradient-to-tr ${p.cover} opacity-90 group-hover:scale-105 transition duration-500"></div>`;
            } else {
                return `<img src="${p.cover}" alt="Cover Image" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" onerror="this.src='https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&w=600&q=80'">`;
            }
        }

        function getCoverMiniHTML(p) {
            if (p.coverType === 'gradient') {
                return `<div class="w-full h-full bg-gradient-to-tr ${p.cover} opacity-90"></div>`;
            } else {
                return `<img src="${p.cover}" alt="Cover Mini" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&w=150&q=80'">`;
            }
        }

        // 搜索过滤处理器
        function handleSearch() {
            const query = document.getElementById("searchInput").value.toLowerCase().trim();
            if (!query) {
                renderProjects();
                return;
            }

            const filtered = projects.filter(p => {
                const name = currentLang === 'zh' ? p.name : (p.name_en || p.name);
                const title = currentLang === 'zh' ? p.title : (p.title_en || p.title);
                return name.toLowerCase().includes(query) || title.toLowerCase().includes(query);
            });

            renderProjects(filtered);
        }

        // 排序规则改变处理器
        function handleSort() {
            const sortVal = document.getElementById("sortBySelect").value;
            
            projects.sort((a, b) => {
                if (sortVal === 'newest') {
                    return b.updatedAt.localeCompare(a.updatedAt);
                } else if (sortVal === 'oldest') {
                    return a.updatedAt.localeCompare(b.updatedAt);
                } else if (sortVal === 'name') {
                    const nameA = currentLang === 'zh' ? a.name : (a.name_en || a.name);
                    const nameB = currentLang === 'zh' ? b.name : (b.name_en || b.name);
                    return nameA.localeCompare(nameB);
                }
            });

            handleSearch();
        }

        // 切换网格与列表视图样式
        function changeView(viewType) {
            currentView = viewType;
            
            const gridBtn = document.getElementById("viewGridBtn");
            const listBtn = document.getElementById("viewListBtn");

            if (viewType === 'grid') {
                gridBtn.className = "w-8 p-1.5 rounded-md text-teal-600 bg-white shadow-sm transition-all duration-200";
                listBtn.className = "w-8 p-1.5 rounded-md text-slate-400 hover:text-slate-600 transition-all duration-200";
            } else {
                listBtn.className = "w-8 p-1.5 rounded-md text-teal-600 bg-white shadow-sm transition-all duration-200";
                gridBtn.className = "w-8 p-1.5 rounded-md text-slate-400 hover:text-slate-600 transition-all duration-200";
            }

            handleSearch();
        }

        // 渲染新建项目中的预设卡片封面
        function renderPresetCovers() {
            const container = document.getElementById("presetCovers");
            const presetsHtml = coverPresets.map((preset, index) => {
                const isActive = index === selectedCoverIndex;
                let bgClass = "";
                let itemContent = "";

                if (preset.type === 'gradient') {
                    bgClass = `bg-gradient-to-tr ${preset.value}`;
                } else {
                    bgClass = `bg-cover bg-center`;
                    itemContent = `style="background-image: url('${preset.value}')"`;
                }

                return `
                    <button type="button" onclick="selectPresetCover(${index})" ${itemContent} class="${bgClass} aspect-square rounded-xl relative border-2 ${isActive ? 'border-teal-600 ring-2 ring-teal-500/15 scale-105' : 'border-transparent'} hover:scale-105 transition duration-150 group">
                        <span class="absolute inset-0 flex items-center justify-center bg-black/10 hover:bg-black/0 text-white text-xs ${isActive ? 'opacity-100' : 'opacity-0'} group-hover:opacity-100 transition-opacity">
                            <i class="fa-solid fa-circle-check text-base"></i>
                        </span>
                    </button>
                `;
            }).join("");

            // 自定义封面：未上传时显示「上传」占位块，已上传时显示缩略图（与色块同尺寸、同一排）
            let customHtml = "";
            if (uploadedCover) {
                const isActive = selectedCoverIndex === -1;
                customHtml = `
                    <div class="aspect-square rounded-xl relative border-2 ${isActive ? 'border-teal-600 ring-2 ring-teal-500/15 scale-105' : 'border-transparent'} bg-cover bg-center overflow-hidden group" style="background-image: url('${uploadedCover}')">
                        <button type="button" onclick="clearUploadedCover()" class="absolute top-0.5 right-0.5 h-5 w-5 rounded-md bg-black/55 hover:bg-black/75 text-white flex items-center justify-center transition" title="移除">
                            <i class="fa-solid fa-xmark text-[10px]"></i>
                        </button>
                    </div>
                `;
            } else {
                customHtml = `
                    <button type="button" onclick="document.getElementById('projectCoverFile').click()" title="${(dictionary[currentLang] && dictionary[currentLang].uploadCover) || ''}" class="aspect-square rounded-xl flex items-center justify-center bg-slate-50 border-2 border-dashed border-slate-300 text-slate-400 hover:border-teal-400 hover:text-teal-600 hover:bg-teal-50/40 transition-all">
                        <i class="fa-solid fa-arrow-up-from-bracket text-sm"></i>
                    </button>
                `;
            }

            container.innerHTML = presetsHtml + customHtml;
        }

        // 选择预置封面动作
        function selectPresetCover(index) {
            selectedCoverIndex = index;
            clearUploadedCover();
            renderPresetCovers();
        }

        // 处理用户上传的自定义封面图
        function handleCoverUpload(event) {
            const file = event.target.files && event.target.files[0];
            if (!file) return;
            if (!file.type.startsWith("image/")) {
                showToast(dictionary[currentLang].toastInvalidImage || "Invalid image", "error");
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                uploadedCover = e.target.result;
                uploadedCoverFile = file;
                selectedCoverIndex = -1;
                renderPresetCovers();
            };
            reader.readAsDataURL(file);
        }

        // 清除已上传的自定义封面图
        function clearUploadedCover() {
            const hadUpload = !!uploadedCover;
            uploadedCover = null;
            uploadedCoverFile = null;
            const fileInput = document.getElementById("projectCoverFile");
            if (fileInput) fileInput.value = "";
            // 若当前选中的就是自定义封面，移除后回退到第一个预设
            if (hadUpload && selectedCoverIndex === -1) selectedCoverIndex = 0;
            renderPresetCovers();
        }

        // 弹窗标题/副标题/按钮文字 — 根据模式动态更新
        const modalCopy = {
            create: {
                zh: { title: "新建项目文件", sub: "所有加入的新项目在创建后均保存在您的本地空间。", btn: "确认创建" },
                en: { title: "New Project File", sub: "Newly created projects are saved directly to your local workspace.", btn: "Create Project" },
                ja: { title: "新規プロジェクト作成", sub: "作成した新しいプロジェクトはローカルスペースに保存されます。", btn: "確認作成" }
            },
            edit: {
                zh: { title: "编辑项目", sub: "修改项目名称、描述及封面图。", btn: "保存修改" },
                en: { title: "Edit Project", sub: "Update the project name, description and cover image.", btn: "Save Changes" },
                ja: { title: "プロジェクトを編集", sub: "プロジェクト名・説明・カバー画像を変更できます。", btn: "変更を保存" }
            }
        };

        function setModalMode(mode) {
            const copy = modalCopy[mode][currentLang] || modalCopy[mode]['ja'];
            document.getElementById("modalTitleEl").innerText = copy.title;
            document.getElementById("modalSubEl").innerText = copy.sub;
            document.getElementById("modalSubmitBtn").innerText = copy.btn;
        }

        // 新建模态框
        function openCreateModal() {
            document.getElementById("editProjectId").value = "";
            document.getElementById("projectForm").reset();
            selectedCoverIndex = 0;
            clearUploadedCover();
            renderPresetCovers();
            setModalMode('create');
            document.getElementById("createModal").classList.remove("hidden");
        }

        function closeCreateModal() {
            document.getElementById("createModal").classList.add("hidden");
            document.getElementById("projectForm").reset();
            document.getElementById("editProjectId").value = "";
            selectedCoverIndex = 0;
            clearUploadedCover();
            renderPresetCovers();
        }

        // 编辑项目 — 复用新建弹窗，预填内容
        function openRenameModal(id) {
            closeAllDropdowns();
            const project = projects.find(p => p.id === id);
            if (!project) return;

            document.getElementById("editProjectId").value = project.id;
            document.getElementById("projectName").value = project.name;
            document.getElementById("projectTitle").value = project.title;

            // 预选封面
            clearUploadedCover();
            if (project.coverType === 'gradient') {
                const presetIdx = coverPresets.findIndex(c => c.type === 'gradient' && c.value === project.cover);
                selectedCoverIndex = presetIdx !== -1 ? presetIdx : -1;
            } else {
                // 检查是否匹配某个图片预设，否则视为自定义封面
                const presetIdx = coverPresets.findIndex(c => c.type !== 'gradient' && c.value === project.cover);
                if (presetIdx !== -1) {
                    selectedCoverIndex = presetIdx;
                } else {
                    selectedCoverIndex = -1;
                    uploadedCover = project.cover;
                }
            }
            renderPresetCovers();

            setModalMode('edit');
            document.getElementById("createModal").classList.remove("hidden");
        }

        // 导出项目数据为 JSON
        function exportProjectData(id) {
            closeAllDropdowns();
            const project = projects.find(p => p.id === id);
            if (!project) return;

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(project, null, 2));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", `${project.name.replace(/\s+/g, '_')}_data.json`);
            document.body.appendChild(dlAnchorElem);
            dlAnchorElem.click();
            dlAnchorElem.remove();

            showToast(dictionary[currentLang].toastExported, "success");
        }

        // 安全删除模态框控制
        function triggerDeleteProject(id) {
            closeAllDropdowns();
            projectToDeleteId = id;

            // 绑定安全删除按钮事件
            const confirmBtn = document.getElementById("confirmDeleteBtn");
            confirmBtn.onclick = executeDeleteProject;

            document.getElementById("deleteConfirmModal").classList.remove("hidden");
        }

        function closeDeleteConfirmModal() {
            document.getElementById("deleteConfirmModal").classList.add("hidden");
            projectToDeleteId = null;
        }

        function executeDeleteProject() {
            if (!projectToDeleteId) return;

            projects = projects.filter(p => p.id !== projectToDeleteId);
            saveToLocalStorage();
            handleSearch();
            closeDeleteConfirmModal();

            showToast(dictionary[currentLang].toastDeleted, "info");
        }

        // 新建 / 编辑 — 统一提交处理
        async function submitProjectForm(e) {
            e.preventDefault();

            const nameInput = document.getElementById("projectName").value.trim();
            const titleInput = document.getElementById("projectTitle").value.trim();
            const editId = document.getElementById("editProjectId").value;

            let finalCover = "";
            let coverType = "gradient";

            if (selectedCoverIndex !== -1) {
                const preset = coverPresets[selectedCoverIndex];
                finalCover = preset.value;
                coverType = preset.type;
            } else if (uploadedCover) {
                finalCover = uploadedCover;
                coverType = "image";
            } else {
                finalCover = "from-slate-500 to-slate-700";
                coverType = "gradient";
            }

            let createdSceneMeta = null;
            if (!editId) {
                const response = await fetch('/api/scenes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: nameInput,
                        graph: { nodes: {}, rootNodeIds: [] }
                    })
                });
                if (!response.ok) throw new Error(`Project create failed (${response.status})`);
                createdSceneMeta = await response.json();

                if (uploadedCoverFile) {
                    const uploadedUrl = await uploadProjectCover(createdSceneMeta.id);
                    if (uploadedUrl) {
                        finalCover = uploadedUrl;
                        coverType = "image";
                    }
                }
                await saveProjectMetadata(createdSceneMeta.id, {
                    name: nameInput,
                    description: titleInput,
                    coverType,
                    coverValue: finalCover
                });
            }

            if (editId) {
                // 编辑模式
                const project = projects.find(p => p.id === editId);
                if (project) {
                    if (uploadedCoverFile) {
                        const uploadedUrl = await uploadProjectCover(editId);
                        if (uploadedUrl) {
                            finalCover = uploadedUrl;
                            coverType = "image";
                        }
                    }
                    await saveProjectMetadata(editId, {
                        name: nameInput,
                        description: titleInput,
                        coverType,
                        coverValue: finalCover
                    });
                    project.name = nameInput;
                    project.title = titleInput;
                    project.cover = finalCover;
                    project.coverType = coverType;
                    project.translatable = false;
                    project.updatedAt = getFormattedCurrentTime();
                }
                saveToLocalStorage();
                handleSearch();
                closeCreateModal();
                showToast(dictionary[currentLang].toastRenamed, "success");
            } else {
                // 新建模式
                const newProject = {
                    id: createdSceneMeta.id,
                    name: nameInput,
                    title: titleInput,
                    cover: finalCover,
                    coverType: coverType,
                    updatedAt: getFormattedCurrentTime(),
                    editorUrl: `/_pascal/scene/${encodeURIComponent(createdSceneMeta.id)}`
                };
                projects.unshift(newProject);
                saveToLocalStorage();
                handleSearch();
                closeCreateModal();
                showToast(dictionary[currentLang].toastCreated, "success");
            }
        }

        // 获取格式化当前时间 (YYYY/MM/DD HH:MM)
        function getFormattedCurrentTime() {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            return `${yyyy}/${mm}/${dd} ${hh}:${min}`;
        }

        // 精美 Toast 通知生成器
        function showToast(message, type = "success") {
            const container = document.getElementById("toastContainer");
            const toast = document.createElement("div");
            
            let iconClass = "fa-solid fa-circle-check text-emerald-500";
            let bgBorder = "bg-white border-l-4 border-emerald-500";
            if (type === 'info') {
                iconClass = "fa-solid fa-circle-info text-blue-500";
                bgBorder = "bg-white border-l-4 border-blue-500";
            }

            toast.className = `${bgBorder} flex items-center gap-3 px-4 py-3 rounded-lg shadow-xl border border-slate-100 max-w-sm transform translate-y-2 opacity-0 transition-all duration-300 ease-out`;
            toast.innerHTML = `
                <i class="${iconClass}"></i>
                <span class="text-xs font-semibold text-slate-700">${message}</span>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove("translate-y-2", "opacity-0");
            }, 50);

            setTimeout(() => {
                toast.classList.add("translate-y-2", "opacity-0");
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 2500);
        }

        // HTML 字符安全过滤器
        function escapeHTML(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
